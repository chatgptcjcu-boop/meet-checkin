<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表9–12 實施評估｜報告書講師學習單</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="worksheet-shared.css">
</head>
<body>
  <div class="doc">
    <nav class="nav">
      <a href="index.html">← 學習單索引</a>
      <a href="../report-wizard-slideshow.html">投影簡報</a>
      <a href="instructor-worksheet-online.html">線上填寫版</a>
    </nav>

    <div class="online-banner">
      <strong>試辦情境練習</strong> — 表10–12 須有具體數字與可抽查證據，非空泛描述。
    </div>

    <div class="cover">
      <h1>貳之四、實施評估</h1>
      <p class="date">表9–12｜試辦數據與結訓標準</p>
      <p class="slide-ref">對應簡報：<a href="../report-wizard-slideshow.html">第 14 頁｜I·E 實施評估</a></p>
    </div>

    <div class="section-nav">
      <a href="section-01-course-info.html">壹 課程資訊</a>
      <a href="section-02-analysis.html">表1–2</a>
      <a href="section-03-design.html">表3–5</a>
      <a href="section-04-resources.html">表6–8</a>
      <a href="section-05-implementation.html" class="active">表9–12</a>
    </div>

    <div class="section">
      <h2 class="sec-title">表9　實際執行人員資格</h2>
      <p class="sec-sub">姓名＋資格證明；對表7 規劃</p>
      <div class="q">
        <div class="field"><label>授課人員（姓名＋資格摘要）</label>
          <textarea class="online-textarea" placeholder="例：王小明／廟務管理實務 8 年，附資歷證明"></textarea>
        </div>
        <div class="field"><label>評量人員</label>
          <textarea class="online-textarea" placeholder="例：李委員／外部評量，非授課教師"></textarea>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 class="sec-title">表10　試辦班成果</h2>
      <p class="sec-sub">起訖日期須與封面辦訓期間一致</p>
      <div class="q">
        <div class="grid-2">
          <div class="field"><label>試辦起訖日期</label><input class="online-input" type="text" placeholder="例：115/03/01–115/05/30"></div>
          <div class="field"><label>參訓人數</label><input class="online-input" type="text" placeholder="例：25 人"></div>
          <div class="field"><label>完訓人數</label><input class="online-input" type="text" placeholder="例：22 人"></div>
          <div class="field"><label>結訓人數（符合標準）</label><input class="online-input" type="text" placeholder="例：20 人"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 class="sec-title">表11　學習成果證據</h2>
      <p class="sec-sub"><span class="icap-tag">iCAP #5.2</span> 各單元具體產出，須與參章上傳檔案一致</p>
      <div class="q">
        <div class="field"><label>示範單元學習產出（可抽查）</label>
          <textarea class="online-textarea tall" placeholder="例：M1-1.1 法人比較自評表 20 份、案例討論紀錄 5 組"></textarea>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 class="sec-title">表12　結訓標準</h2>
      <p class="sec-sub">須與表8 評量方式、成績總表邏輯呼應；至少勾一項</p>
      <div class="q">
        <div class="opts" style="flex-direction:column;align-items:flex-start;">
          <label><input type="checkbox"> 各階段評量（模組／單元門檻）</label>
          <label><input type="checkbox"> 學科成績（筆試及格標準）</label>
          <label><input type="checkbox"> 術科成績（實作評量及格標準）</label>
          <label><input type="checkbox"> 其他（出缺席、作業繳交…）</label>
        </div>
        <div class="field"><label>結訓標準說明</label>
          <textarea class="online-textarea" placeholder="例：全模組評量達標 + 總成績 70 分 + 出席率 80%"></textarea>
        </div>
      </div>
    </div>

    <p class="nav" style="padding:1rem 18mm">
      <a href="section-04-resources.html">← 上一章</a>
      <a href="instructor-worksheet-online.html">完成練習 → 線上填寫版提交</a>
    </p>
  </div>
</body>
</html>
