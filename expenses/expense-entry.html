<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>工讀生記帳登錄</title>
  <link rel="stylesheet" href="./expense.css">
  <script src="./auth.js"></script>
</head>
<body>
  <div class="top-bar no-print">
    <h1>記帳登錄（工讀生／專案人員）</h1>
    <button type="button" id="btnSyncPending">同步送審</button>
    <button type="button" id="btnSaveCloud" class="primary">☁ 儲存正式總帳</button>
    <a class="btn" href="./index.html">← 入口</a>
  </div>
  <div class="wrap">
    <div id="financeNav"></div>
    <p class="note no-print" id="entryHelp">工讀生填寫後會先送交主辦審核並寄信通知，不會直接進入總帳。主辦確認收到後，按「確認收到並匯入」才會併入正式經費管理。</p>
    <div class="panel no-print" id="pendingPanel">
      <h2>工讀生送出一筆支出</h2>
      <form id="entryForm" class="form-grid">
        <label>登錄人
          <select id="submitter" required></select>
        </label>
        <label>日期
          <input type="date" id="entryDate" required>
        </label>
        <label>類別
          <select id="category">
            <option>交通費</option>
            <option>餐費</option>
            <option>耗材</option>
            <option>工讀時數</option>
            <option>其他</option>
          </select>
        </label>
        <label>金額（元）
          <input type="number" id="amount" min="0" step="1" required>
        </label>
        <label class="span-2">說明
          <input type="text" id="note" placeholder="例：6/30 會議往返高鐵">
        </label>
        <label class="span-2">關聯會議（選填）
          <select id="eventId"><option value="">—</option></select>
        </label>
        <div class="span-2 btn-row">
          <button type="submit" class="btn-sm primary">送出給主辦審核</button>
        </div>
      </form>
    </div>
    <div class="panel no-print">
      <h2>主辦待審清單</h2>
      <table class="sheet" id="pendingTable">
        <thead>
          <tr><th>提交時間</th><th>日期</th><th>登錄人</th><th>類別</th><th>金額</th><th>說明</th><th>狀態</th><th>操作</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="panel" id="officialPanel">
      <h2>正式總帳記帳清單</h2>
      <table class="sheet" id="entryTable">
        <thead>
          <tr><th>日期</th><th>登錄人</th><th>類別</th><th>金額</th><th>說明</th><th>狀態</th><th class="no-print">操作</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
  <div id="status" class="sync-banner no-print" hidden></div>
  <script src="../config/event.config.js"></script>
  <script src="./expense-finance.js"></script>
  <script src="./expense-entry.js"></script>
</body>
</html>
