<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Phase 0｜身分與單元確認｜教材編審 Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; max-width: 52rem; margin: 1.5rem auto; padding: 0 1rem; }
    .box { background: #fff; border-radius: 0.75rem; padding: 2rem; box-shadow: 0 4px 12px rgb(0 0 0 / 0.08); }
    h1 { font-size: 1.25rem; border-left: 4px solid #1e40af; padding-left: 0.75rem; }
    .meta { color: #6b7280; font-size: 0.85rem; margin: 0.5rem 0 1.25rem; }
    .q { border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 1rem; margin: 0.75rem 0; background: #fafafa; }
    .q-id { color: #1e40af; font-weight: 700; font-size: 0.8rem; }
    .field { margin-top: 0.5rem; }
    .field input, .field textarea { width: 100%; border: 1px solid #d1d5db; border-radius: 0.375rem; padding: 0.5rem; font-size: 0.9rem; }
    .field textarea { min-height: 3rem; }
    .alert { background: #eff6ff; border: 1px solid #93c5fd; padding: 0.75rem; border-radius: 0.5rem; font-size: 0.88rem; margin-bottom: 1rem; }
    a { color: #1e40af; font-size: 0.85rem; }
    @media print { body { background: #fff; } .box { box-shadow: none; } }
  </style>
</head>
<body>
  <div class="box">
    <p><a href="index.html">← Demo 索引</a> · <a href="02-Phase1-職能與教學內容.html">Phase 1 →</a></p>
    <h1>Phase 0｜身分確認與示範單元定位</h1>
    <p class="meta">00:00–00:10｜iCAP：利害關係人參與｜產出：出席卡、單元定位卡</p>
    <div class="alert"><strong>會議定位：</strong>今日完成示範單元 <strong>M1-1.1</strong> 全流程，作為後續 86 單元編審之標準程序。</div>

    <div class="q"><div class="q-id">P0-1</div><strong>基本資料</strong>
      <div class="field"><label>姓名</label><input type="text"></div>
      <div class="field"><label>服務單位／宮廟</label><input type="text"></div>
      <div class="field"><label>聯絡電話</label><input type="text"></div>
    </div>

    <div class="q"><div class="q-id">P0-2</div><strong>編審角色（今日為學員身分，請勾選未來可能角色）</strong>
      <p style="font-size:0.9rem;margin:0.5rem 0">□ 主筆　□ 協作　□ 審閱　□ 主審（模組負責人）</p>
    </div>

    <div class="q"><div class="q-id">P0-3</div><strong>單元定位卡（M1-1.1）</strong>
      <div class="field"><label>單元代碼</label><input type="text" value="M1-1.1" readonly></div>
      <div class="field"><label>所屬模組</label><input type="text" placeholder="M1 寺廟組織治理"></div>
      <div class="field"><label>建議時數</label><input type="text" placeholder="2 小時"></div>
      <div class="field"><label>對應職能／T 編號</label><input type="text" placeholder="T1"></div>
      <div class="field"><label>本單元一句話定位</label><textarea placeholder="例：理解寺廟法人登記之必要性與型態差異"></textarea></div>
    </div>

    <div class="q"><div class="q-id">P0-4</div><strong>是否曾參與 iCAP 職能導向課程開發？</strong>
      <p style="font-size:0.9rem">□ 是（請簡述）　□ 否（今日為首次）</p>
      <div class="field"><textarea placeholder="簡述經驗或學習期待"></textarea></div>
    </div>
  </div>
</body>
</html>
