<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>考古題範本｜M1-1.1</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; max-width: 210mm; margin: 1rem auto; padding: 14mm; font-size: 10.5pt; line-height: 1.6; }
    h1 { font-size: 1.15rem; border-bottom: 2px solid #1e40af; padding-bottom: 0.35rem; }
    .meta { font-size: 0.85rem; color: #666; margin-bottom: 1rem; }
    .q { border: 1px solid #e5e7eb; border-radius: 0.35rem; padding: 0.75rem; margin: 0.75rem 0; }
    .q-num { font-weight: 700; color: #1e40af; }
    .write { border-bottom: 1px solid #ccc; min-height: 1.5rem; margin: 0.35rem 0; }
    .opts { margin: 0.35rem 0 0 1rem; }
    @media print { .q { break-inside: avoid; } }
  </style>
</head>
<body>
  <h1>評量附錄一｜考古題風格試題</h1>
  <p class="meta">單元 M1-1.1｜講師姓名：________｜對應 ABCD 之 B 欄：________</p>

  <div class="q">
    <div class="q-num">一、選擇題（示範 2 題，現場起草）</div>
    <p><strong>1.</strong> 下列何者<strong>不屬於</strong>寺廟常見法人組織型態？</p>
    <div class="opts">(A) <div class="write"></div> (B) <div class="write"></div> (C) <div class="write"></div> (D) <div class="write"></div></div>
    <p><strong>2.</strong> （自擬題幹）</p>
    <div class="write" style="min-height:3rem"></div>
    <div class="opts">(A) (B) (C) (D)</div>
  </div>

  <div class="q">
    <div class="q-num">二、是非題（2 題）</div>
    <p>1. □是 □否　<div class="write"></div></p>
    <p>2. □是 □否　<div class="write"></div></p>
  </div>

  <div class="q">
    <div class="q-num">三、簡答題（1 題，對應 B 欄動詞）</div>
    <p>請依情境說明…（題幹）</p>
    <div class="write" style="min-height:5rem"></div>
    <p class="meta">參考配分：____ 分｜評分規準：________</p>
  </div>
</body>
</html>
