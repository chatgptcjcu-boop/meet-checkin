<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>現場簽到</title>
  <script src="../config/event.config.js"></script>
  <script src="../config/apply-event-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/checkin.css">
</head>
<body class="bg-slate-100 min-h-screen font-sans">

  <header class="bg-blue-900 text-white border-b-4 border-yellow-500 sticky top-0 z-20 shadow-md">
    <div class="max-w-2xl mx-auto px-4 py-4 text-center">
      <a href="../" class="text-blue-300 text-xs hover:text-white">← 返回會議入口</a>
      <p class="text-yellow-300 text-sm font-semibold mt-2">現場簽到</p>
      <h1 class="text-xl font-bold" data-event="event.title">現場簽到</h1>
      <p class="text-blue-200 text-xs mt-1" data-event="event.dateRoc"></p>
    </div>
  </header>

  <!-- 名單 -->
  <main id="listView" class="max-w-2xl mx-auto px-4 py-6">
    <div class="flex bg-slate-200 rounded-xl p-1 mb-5 shadow-inner">
      <button type="button" id="tabSignIn" class="flex-1 py-2.5 text-sm font-bold rounded-lg bg-white text-emerald-700 shadow">簽到（進場）</button>
      <button type="button" id="tabSignOut" class="flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500">簽退（離場）</button>
    </div>

    <p id="listHint" class="text-center text-slate-600 text-sm mb-4">
      請從<strong class="text-emerald-700">委員名單點選您的姓名</strong>，拍照完成簽到。
    </p>

    <input type="search" id="searchBox" placeholder="搜尋姓名…" class="w-full mb-4 px-4 py-3 rounded-xl border border-slate-300 bg-white shadow-sm" oninput="renderList()">

    <section class="mb-5">
      <h2 class="text-sm font-bold text-blue-800 mb-2" data-sign-in-label="committee">評核委員</h2>
      <div id="committeeList" class="space-y-2"></div>
    </section>
    <section class="mb-6">
      <h2 class="text-sm font-bold text-emerald-800 mb-2" data-sign-in-label="observers">列席人員</h2>
      <div id="observerList" class="space-y-2"></div>
    </section>

    <!-- 其他現場人員 -->
    <section class="bg-white rounded-2xl border-2 border-dashed border-slate-300 p-5 mb-6">
      <h2 class="font-bold text-slate-800 mb-1">其他現場人員</h2>
      <p class="text-sm text-slate-500 mb-4">不在上述名單者，請選身份別、填中文姓名後簽到。</p>
      <button type="button" id="openGuestBtn" class="w-full bg-slate-700 hover:bg-slate-800 text-white font-bold py-3 rounded-xl">
        其他現場人員簽到 →
      </button>
    </section>
  </main>

  <!-- 名單成員簽到 -->
  <main id="checkinPanel" class="max-w-md mx-auto px-4 py-6">
    <button type="button" onclick="backToList()" class="text-emerald-700 font-semibold text-sm mb-4">← 返回名單</button>
    <div id="formArea" class="bg-white rounded-2xl shadow-lg border p-6">
      <div class="text-center mb-4">
        <p id="panelModeLabel" class="text-xs font-bold text-emerald-600 mb-1">現場簽到</p>
        <h2 id="selectedName" class="text-2xl font-bold"></h2>
        <p id="selectedMeta" class="text-sm text-slate-500 mt-1"></p>
      </div>
      <div class="text-center mb-4">
        <div class="video-container shadow-sm">
          <video id="webcam" autoplay playsinline></video>
          <img id="capturedPhoto" alt="大頭照">
          <div id="cameraStatus" class="absolute inset-0 flex items-center justify-center text-xs text-slate-500 p-3 bg-slate-100 text-center">正在存取相機…</div>
        </div>
      </div>
      <label class="flex items-start gap-3 mb-4 text-sm">
        <input type="checkbox" id="recordConsent" class="mt-1 w-5 h-5">
        <span id="consentText"></span>
      </label>
      <button type="button" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl">拍攝並完成</button>
    </div>
  </main>

  <!-- 其他現場人員 -->
  <main id="guestPanel" class="max-w-md mx-auto px-4 py-6">
    <button type="button" onclick="backToList()" class="text-emerald-700 font-semibold text-sm mb-4">← 返回名單</button>
    <div id="guestFormArea" class="bg-white rounded-2xl shadow-lg border p-6">
      <div class="text-center mb-4">
        <p id="guestModeLabel" class="text-xs font-bold text-slate-600 mb-1">其他現場人員</p>
        <h2 class="text-lg font-bold text-slate-800">手動登記簽到</h2>
      </div>
      <div class="text-center mb-4">
        <div class="video-container shadow-sm">
          <video id="guestWebcam" autoplay playsinline></video>
          <img id="guestCapturedPhoto" alt="大頭照" style="display:none;width:100%;height:165px;object-fit:cover;transform:scaleX(-1)">
          <div id="guestCameraStatus" class="absolute inset-0 flex items-center justify-center text-xs text-slate-500 p-3 bg-slate-100 text-center">正在存取相機…</div>
        </div>
      </div>
      <div class="space-y-3 mb-4">
        <div>
          <label class="block text-sm font-semibold mb-1">真實中文姓名 <span class="text-red-500">*</span></label>
          <input type="text" id="guestName" class="w-full px-4 py-3 rounded-lg border" placeholder="例如：王小明" required>
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1">身份別 <span class="text-red-500">*</span></label>
          <select id="guestRole" class="w-full px-4 py-3 rounded-lg border bg-white" required>
            <option value="" disabled selected>請選擇身份</option>
          </select>
        </div>
      </div>
      <label class="flex items-start gap-3 mb-4 text-sm">
        <input type="checkbox" id="guestConsent" class="mt-1 w-5 h-5">
        <span id="guestConsentText"></span>
      </label>
      <button type="button" id="guestSubmitBtn" class="w-full bg-slate-700 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl">拍攝並完成</button>
    </div>
  </main>

  <div id="loadingOverlay" class="fixed inset-0 bg-blue-900/95 z-50 flex flex-col items-center justify-center">
    <div class="spinner mb-4"></div>
    <h2 id="loadingTitle" class="text-xl text-white font-bold">正在傳送…</h2>
  </div>
  <div id="successOverlay" class="fixed inset-0 bg-green-900/95 z-50 flex flex-col items-center justify-center text-center px-6">
    <h2 id="successTitle" class="text-3xl text-white font-bold mb-2">完成</h2>
    <p id="successMsg" class="text-green-200 text-lg mb-6"></p>
    <button type="button" onclick="backToList(true)" class="bg-white text-green-800 font-bold px-6 py-3 rounded-xl">返回名單</button>
  </div>

  <script src="../assets/checkin.js?v=5"></script>
  <script src="../assets/members.js"></script>
  <script>window.applyConfigRoster && window.applyConfigRoster(); MeetCheckinConfig.init({ meta: false, roleSelectId: 'guestRole' });</script>
  <script>
    const CHANNEL = '現場';
    let currentMode = 'signin';
    let selectedMember = null;
    let guestStreamRef = null;
    let isGuest = false;

    function memberCard(m, group, index) {
      const ok = isOnsiteMember(m);
      const hint = !ok ? (m.attendance === '請假' ? '已請假' : '請至視訊簽到入口') : '';
      return `<button type="button" data-group="${group}" data-index="${index}" class="member-btn w-full text-left bg-white rounded-xl border p-4 shadow-sm flex justify-between gap-3 ${ok ? 'hover:border-emerald-400 hover:bg-emerald-50' : ''}" ${ok ? '' : 'disabled'}>
        <div><div class="font-bold text-lg">${m.name}</div><div class="text-sm text-slate-500 truncate">${m.org}｜${m.title}</div>${hint ? '<div class="text-xs text-slate-400 mt-1">'+hint+'</div>' : ''}</div>
        <div>${attendanceBadge(m.attendance)}</div></button>`;
    }

    function renderList() {
      const q = (document.getElementById('searchBox').value || '').trim();
      const f = m => !q || [m.name,m.org,m.title].some(s => s.includes(q));
      const cl = MEMBER_ROSTER.committee.map((m,i)=>({m,i})).filter(({m})=>f(m));
      const ol = MEMBER_ROSTER.observers.map((m,i)=>({m,i})).filter(({m})=>f(m));
      document.getElementById('committeeList').innerHTML = cl.map(({m,i})=>memberCard(m,'committee',i)).join('') || '<p class="text-slate-400 text-sm text-center py-3">無符合（主辦請於 config 填入名單）</p>';
      document.getElementById('observerList').innerHTML = ol.map(({m,i})=>memberCard(m,'observers',i)).join('') || '<p class="text-slate-400 text-sm text-center py-3">無符合</p>';
    }

    document.addEventListener('click', e => {
      const btn = e.target.closest('.member-btn[data-group]:not(:disabled)');
      if (!btn) return;
      selectMember(MEMBER_ROSTER[btn.dataset.group][parseInt(btn.dataset.index,10)]);
    });

    document.getElementById('tabSignIn').onclick = () => switchMode('signin');
    document.getElementById('tabSignOut').onclick = () => switchMode('signout');
    document.getElementById('openGuestBtn').onclick = openGuest;
    document.getElementById('submitBtn').onclick = () => submitCheckin(false);
    document.getElementById('guestSubmitBtn').onclick = () => submitCheckin(true);

    function switchMode(mode) {
      currentMode = mode;
      const si = document.getElementById('tabSignIn');
      const so = document.getElementById('tabSignOut');
      const hint = document.getElementById('listHint');
      if (mode === 'signin') {
        si.className = 'flex-1 py-2.5 text-sm font-bold rounded-lg bg-white text-emerald-700 shadow';
        so.className = 'flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500';
        hint.innerHTML = '請從<strong class="text-emerald-700">委員名單點選您的姓名</strong>，或下方登記其他現場人員。';
      } else {
        so.className = 'flex-1 py-2.5 text-sm font-bold rounded-lg bg-white text-green-700 shadow';
        si.className = 'flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500';
        hint.innerHTML = '請點選姓名或登記其他現場人員，完成<strong class="text-green-700">簽退</strong>。';
      }
      updateConsent();
    }

    function updateConsent() {
      const signIn = currentMode === 'signin';
      document.getElementById('panelModeLabel').textContent = signIn ? '現場簽到' : '現場簽退';
      document.getElementById('guestModeLabel').textContent = signIn ? '其他現場人員簽到' : '其他現場人員簽退';
      const c = signIn
        ? '<strong class="text-red-600">【現場簽到同意】</strong><br>本人同意拍攝大頭照存證，並確認出席本次會議。'
        : '<strong class="text-green-700">【現場簽退】</strong><br>本人確認已完成會議，同意拍攝簽退大頭照。';
      document.getElementById('consentText').innerHTML = c;
      document.getElementById('guestConsentText').innerHTML = c;
      document.getElementById('submitBtn').textContent = signIn ? '拍攝並完成簽到' : '拍攝並完成簽退';
      document.getElementById('guestSubmitBtn').textContent = signIn ? '拍攝並完成簽到' : '拍攝並完成簽退';
    }

    function selectMember(m) {
      isGuest = false;
      selectedMember = m;
      document.getElementById('selectedName').textContent = m.name;
      document.getElementById('selectedMeta').textContent = `${m.role}｜${m.org}｜${m.title}`;
      document.getElementById('recordConsent').checked = false;
      document.getElementById('listView').style.display = 'none';
      document.getElementById('checkinPanel').style.display = 'block';
      document.getElementById('guestPanel').style.display = 'none';
      updateConsent();
      MeetCheckin.resetCameraUI();
      MeetCheckin.startCamera();
      window.scrollTo(0,0);
    }

    function openGuest() {
      isGuest = true;
      selectedMember = null;
      document.getElementById('guestName').value = '';
      document.getElementById('guestRole').value = '';
      document.getElementById('guestConsent').checked = false;
      document.getElementById('listView').style.display = 'none';
      document.getElementById('checkinPanel').style.display = 'none';
      document.getElementById('guestPanel').style.display = 'block';
      updateConsent();
      startGuestCamera();
      window.scrollTo(0,0);
    }

    async function startGuestCamera() {
      const video = document.getElementById('guestWebcam');
      const st = document.getElementById('guestCameraStatus');
      MeetCheckin.setSubmitReady(false);
      try {
        guestStreamRef = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false,
        });
        video.srcObject = guestStreamRef;
        await MeetCheckin.bindStreamToVideo(video, guestStreamRef, st);
      } catch (e) {
        if (st) st.innerHTML = '<span class="text-red-500 font-bold">無法存取相機</span>';
      }
    }

    function stopGuestCamera() {
      if (guestStreamRef) { guestStreamRef.getTracks().forEach(t=>t.stop()); guestStreamRef = null; }
    }

    function backToList(fromSuccess) {
      if (fromSuccess) document.getElementById('successOverlay').style.display = 'none';
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('listView').style.display = 'block';
      document.getElementById('checkinPanel').style.display = 'none';
      document.getElementById('guestPanel').style.display = 'none';
      selectedMember = null;
      MeetCheckin.stopCamera();
      stopGuestCamera();
      MeetCheckin.resetCameraUI();
      document.getElementById('submitBtn').style.display = 'block';
      document.getElementById('guestSubmitBtn').style.display = 'block';
    }

    function submitCheckin(guest) {
      let name, role, consent, btnId;
      let videoEl;
      if (guest) {
        name = document.getElementById('guestName').value.trim();
        role = document.getElementById('guestRole').value + '（現場）';
        consent = document.getElementById('guestConsent').checked;
        btnId = 'guestSubmitBtn';
        videoEl = document.getElementById('guestWebcam');
        if (!name || !document.getElementById('guestRole').value) { alert('請填寫姓名與身份別'); return; }
      } else {
        if (!selectedMember) return;
        name = selectedMember.name;
        role = selectedMember.role + '（現場）';
        consent = document.getElementById('recordConsent').checked;
        btnId = 'submitBtn';
        videoEl = document.getElementById('webcam');
      }
      if (!consent) { alert('請勾選同意事項'); return; }

      document.getElementById('loadingTitle').textContent = currentMode === 'signin' ? '正在傳送簽到資料…' : '正在傳送簽退資料…';
      document.getElementById('loadingOverlay').style.display = 'flex';

      const postData = {
        action: currentMode === 'signin' ? '簽到' : '簽退',
        name, role, consent,
        timestamp: new Date().toISOString(),
        source: CHANNEL + '簽到',
      };
      if (!guest && selectedMember) {
        postData.org = selectedMember.org;
        postData.title = selectedMember.title;
      }

      MeetCheckin.submitSignIn(videoEl, postData, function (ok) {
        if (guest) stopGuestCamera();
        document.getElementById('loadingOverlay').style.display = 'none';
        if (ok) {
          finishSuccess(name, btnId);
        } else {
          document.getElementById(btnId).style.display = 'block';
        }
      });
    }

    function finishSuccess(name, btnId) {
      document.getElementById('successTitle').textContent = currentMode === 'signin' ? '簽到完成' : '簽退完成';
      document.getElementById('successMsg').textContent = name + '，感謝您的參與！';
      document.getElementById('successOverlay').style.display = 'flex';
      document.getElementById(btnId).style.display = 'block';
    }

    switchMode('signin');
    renderList();
  </script>
</body>
</html>
