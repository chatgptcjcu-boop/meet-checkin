<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺灣道法總會－教育委員會 視訊會議入口</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            /* 帶有莊重感的漸層背景 */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        .header-gradient {
            /* 莊重且帶有教育/道法意象的深藍與金色點綴 */
            background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);
            border-bottom: 4px solid #d4af37; /* 香檳金邊 */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- 最上面的網頁框架：固定顯示會議名稱 -->
    <header class="header-gradient text-white w-full py-4 px-6 shadow-md fixed top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex-1">
                <p class="text-sm md:text-base text-gray-200 font-medium tracking-wider mb-1">
                    臺灣道法總會－教育委員會
                </p>
                <h1 class="text-lg md:text-2xl font-bold tracking-wide leading-snug">
                    2026宮廟管理師職能基準 iCAP推動與職能導向課程發展
                </h1>
            </div>
            <div class="bg-white/20 px-4 py-2 rounded-lg border border-white/30 flex items-center gap-2 whitespace-nowrap">
                <i class="fa-solid fa-circle text-red-500 animate-pulse text-xs"></i>
                <span class="text-sm font-medium tracking-widest">同步錄影中</span>
            </div>
        </div>
    </header>

    <!-- 主要報到內容區塊 -->
    <main class="flex-grow flex items-center justify-center p-4 mt-28 mb-12">
        <div class="glass-panel w-full max-w-lg rounded-2xl overflow-hidden transform transition-all">
            
            <!-- 會議資訊 -->
            <div class="bg-gray-50 p-8 border-b border-gray-100 text-center">
                <div class="inline-block p-4 rounded-full bg-blue-50 text-blue-800 mb-4">
                    <i class="fa-solid fa-users-viewfinder text-4xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">第一次評核委員委員會議</h2>
                <div class="flex items-center justify-center gap-2 text-gray-600 font-medium bg-gray-200/50 inline-flex px-4 py-1.5 rounded-full">
                    <i class="fa-regular fa-calendar-check"></i>
                    <span>會議日期：2026 / 06 / 30</span>
                </div>
            </div>

            <!-- 報到表單 -->
            <div class="p-8">
                <form id="joinForm" class="space-y-6">
                    
                    <!-- 中文名稱輸入 -->
                    <div>
                        <label for="userName" class="block text-sm font-bold text-gray-700 mb-2">
                            <i class="fa-solid fa-user mr-1 text-gray-400"></i> 中文名稱 (真實姓名)
                        </label>
                        <input type="text" id="userName" name="userName" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-gray-800 placeholder-gray-400"
                            placeholder="請輸入您的完整中文姓名">
                    </div>

                    <!-- 身份別選擇 -->
                    <div>
                        <label for="userRole" class="block text-sm font-bold text-gray-700 mb-2">
                            <i class="fa-solid fa-id-badge mr-1 text-gray-400"></i> 身份別
                        </label>
                        <div class="relative">
                            <select id="userRole" name="userRole" required
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-gray-800 appearance-none bg-white">
                                <option value="" disabled selected>請選擇您的參與身份...</option>
                                <option value="評核委員">評核委員</option>
                                <option value="計畫主持人/共同主持人">計畫主持人 / 共同主持人</option>
                                <option value="課程專家學者">課程專家學者</option>
                                <option value="教育委員會幹部">教育委員會幹部</option>
                                <option value="專案行政助理">專案行政助理</option>
                                <option value="列席貴賓">列席貴賓 / 旁聽</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                <i class="fa-solid fa-chevron-down text-sm"></i>
                            </div>
                        </div>
                    </div>

                    <!-- 錄影同意勾選 -->
                    <div class="flex items-start mt-4 bg-yellow-50 p-4 rounded-lg border border-yellow-200">
                        <div class="flex items-center h-5">
                            <input id="recordingConsent" name="recordingConsent" type="checkbox" required
                                class="w-5 h-5 text-blue-600 bg-white border-gray-300 rounded focus:ring-blue-500 focus:ring-2 cursor-pointer">
                        </div>
                        <div class="ml-3 text-sm">
                            <label for="recordingConsent" class="font-bold text-gray-800 cursor-pointer">我已了解並同意會議錄影</label>
                            <p class="text-gray-600 mt-1">為確保專案推動之記錄完整性，本視訊會議將全程進行同步錄影、錄音。加入會議即表示您同意授權主辦單位記錄。</p>
                        </div>
                    </div>

                    <!-- 提交按鈕 -->
                    <button type="submit" id="submitBtn"
                        class="w-full bg-gradient-to-r from-[#1e3c72] to-[#2a5298] hover:from-[#152a55] hover:to-[#1e3c72] text-white font-bold py-4 px-6 rounded-lg shadow-lg transform transition-all hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-blue-300 flex items-center justify-center gap-3">
                        <i class="fa-brands fa-google"></i>
                        <span>加入 Google Meet 視訊會議</span>
                    </button>
                </form>
                
                <!-- 載入中動畫 (預設隱藏) -->
                <div id="loadingState" class="hidden text-center py-6">
                    <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent mb-4"></div>
                    <p class="text-gray-800 font-bold" id="loadingText">正在為您準備會議室...</p>
                    <p class="text-sm text-gray-500 mt-2">請確保您的麥克風與攝影機已準備就緒</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center text-sm text-gray-500 pb-6">
        &copy; 2026 臺灣道法總會 教育委員會 版權所有
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('joinForm');
            const loadingState = document.getElementById('loadingState');
            
            const googleMeetUrl = "https://meet.google.com/kci-xjtu-dmr";

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const userName = document.getElementById('userName').value.trim();
                const userRole = document.getElementById('userRole').value;
                const isConsent = document.getElementById('recordingConsent').checked;

                if (!userName || !userRole || !isConsent) {
                    return;
                }

                form.style.display = 'none';
                loadingState.classList.remove('hidden');
                
                setTimeout(() => {
                    document.getElementById('loadingText').innerHTML = 
                        `歡迎，${userRole} ${userName}！<br>正在為您導向至會議室...`;
                    
                    window.location.href = googleMeetUrl;
                    
                }, 1500);
            });
        });
    </script>
</body>
</html>
