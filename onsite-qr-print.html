<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>現場簽到 QR Code｜列印用</title>
  <script src="config/event.config.js"></script>
  <script src="config/apply-event-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #e2e8f0; }
    .print-bar { background: #1e293b; color: #fff; text-align: center; padding: 0.65rem; font-size: 0.85rem; position: sticky; top: 0; }
    .print-bar a, .print-bar button { margin-left: 0.5rem; padding: 0.4rem 1rem; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; text-decoration: none; background: #fff; color: #1e293b; display: inline-block; }
    .sheet { width: 210mm; min-height: 297mm; margin: 1rem auto 2rem; background: #fff; box-shadow: 0 4px 24px rgb(0 0 0 / 0.12); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 18mm 15mm; text-align: center; }
    .org { font-size: 0.95rem; color: #475569; letter-spacing: 0.12em; margin-bottom: 0.5rem; }
    h1 { font-size: 1.65rem; font-weight: 900; line-height: 1.35; margin-bottom: 0.35rem; }
    .date { font-size: 1.1rem; font-weight: 700; color: #047857; margin-bottom: 1.5rem; }
    .qr-wrap { border: 4px solid #047857; border-radius: 16px; padding: 10mm; margin-bottom: 1.25rem; }
    .qr-wrap img { width: 68mm; height: 68mm; }
    .scan-title { font-size: 1.35rem; font-weight: 900; color: #047857; margin-bottom: 0.75rem; }
    .steps { text-align: left; max-width: 150mm; font-size: 0.95rem; line-height: 1.75; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 0.85rem 1.1rem; }
    .steps ol { padding-left: 1.25rem; }
    .url { font-size: 0.72rem; color: #64748b; margin-top: 0.75rem; word-break: break-all; }
    @media print { body { background: #fff; } .print-bar { display: none; } .sheet { margin: 0; box-shadow: none; } @page { size: A4 portrait; margin: 12mm; } }
  </style>
</head>
<body>
  <div class="print-bar no-print">
    現場簽到 QR｜列印用
    <a href="./onsite-projector.html">投影版</a>
    <button type="button" onclick="window.print()">🖨 列印</button>
  </div>
  <div class="sheet">
    <p class="org" data-event="org.headerLine">臺灣道法總會｜教育委員會</p>
    <h1 data-event="event.title">會議現場簽到</h1>
    <p class="date" data-event-date-line>—｜現場簽到</p>
    <div class="qr-wrap"><img src="./assets/onsite-qrcode.png" alt="現場簽到 QR Code" width="400" height="400"></div>
    <p class="scan-title">請掃描 QR Code 完成簽到</p>
    <div class="steps">
      <ol>
        <li>用手機相機或 LINE 掃描 QR Code</li>
        <li><strong data-sign-in-label="committee">評核委員</strong>：名單點選姓名</li>
        <li><strong>其他現場人員</strong>：選身份別 → 填姓名 → 拍照</li>
      </ol>
    </div>
    <p class="url" data-event="paths.onsiteCheckinUrl">https://chatgptcjcu-boop.github.io/meet-checkin/onsite-checkin/</p>
  </div>
  <script>MeetCheckinConfig.init({ meta: false });</script>
</body>
</html>
