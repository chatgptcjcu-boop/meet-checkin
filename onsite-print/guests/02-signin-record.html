<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>現場簽到記錄單｜列席者</title>
  <link rel="stylesheet" href="../assets/print.css">
  <style>
  .sign-sheet { padding: 14mm 18mm; }
  .sign-sheet h2 { font-size: 1.15rem; border-bottom: 2px solid #1e3a5f; padding-bottom: 0.35rem; margin: 0 0 1rem; }
  .role-row { display: flex; flex-wrap: wrap; gap: 0.5rem 1.25rem; margin: 0.5rem 0 1rem; font-size: 0.9rem; }
  .consent { border: 1px solid #999; padding: 0.65rem 0.85rem; margin: 1rem 0; font-size: 0.85rem; line-height: 1.6; }
  </style>
</head>
<body>
<div class="print-bar no-print">
  列席者｜現場簽到記錄單（可多份列印）
  <button type="button" onclick="window.print()">🖨 列印／另存 PDF</button>
</div>
<div class="doc print-sheet">
  <div class="sign-sheet">
    <h2>現場簽到記錄單</h2>
    <p style="font-size:0.88rem;color:#555;margin:0 0 1rem">宮廟管理師｜第一次評核委員會｜115年6月30日</p>

    <div class="grid-2">
      <div class="field"><label>中文姓名</label><div class="write-line">&nbsp;</div></div>
      <div class="field"><label>服務單位／宮廟全銜</label><div class="write-line">&nbsp;</div></div>
      <div class="field"><label>職稱</label><div class="write-line">&nbsp;</div></div>
      <div class="field"><label>聯絡電話</label><div class="write-line">&nbsp;</div></div>
    </div>

    <p style="font-weight:600;margin:1rem 0 0.35rem;font-size:0.9rem">身份別（請圈選一項）</p>
    <div class="role-row">
      <span class="print-opt">○ 專家顧問</span>
      <span class="print-opt">○ 專案工作人員</span>
      <span class="print-opt">○ 列席人員</span>
      <span class="print-opt">○ 觀摩來賓</span>
      <span class="print-opt">○ 其他：__________</span>
    </div>

    <div class="consent">
      <strong>錄影／攝影授權（請圈選）</strong><br>
      <span class="print-opt">○ 同意</span>
      <span class="print-opt">○ 不同意</span>
      <span style="font-size:0.82rem;color:#555">（會議可能進行紀錄拍攝，供計畫內部使用）</span>
    </div>

    <div class="field" style="margin-top:1rem">
      <label>簽到時間（工作人員填寫）</label>
      <div class="write-line">&nbsp;</div>
    </div>

    <div class="field">
      <label>備註／會中觀察與建議（選填）</label>
      <div class="write-box tall" style="min-height:6rem"></div>
    </div>

    <div class="sign-grid" style="margin-top:1.5rem">
      <div>本人簽名：________________</div>
      <div>日期：115 / 6 / 30</div>
    </div>

    <p style="font-size:0.78rem;color:#888;margin-top:2rem;border-top:1px solid #ddd;padding-top:0.5rem">
      ※ 亦可使用線上現場簽到（掃描會場 QR）完成簽到與拍照；本單供紙本備用或補登使用。
    </p>

    <div class="page-footer"><span>臺灣道法總會｜宮廟管理師職能基準發展計畫</span><span>第 <span class="pagenum"></span> 頁</span></div>
  </div>
</div>
</body>
</html>
